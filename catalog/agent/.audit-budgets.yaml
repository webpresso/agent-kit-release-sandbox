# Agent-kit audit budgets — override defaults here
# Generated by wp setup; safe to modify and commit
budgets:
  codex-skill-listing-total:
    max_bytes: 7000          # Codex 8000-char hard cap with 1KB headroom
  claude-skill-description-each:
    max_bytes: 800
  agents-md-section-each:
    max_bytes: 4096
    suggest_compact_at: 0.75
  skill-md-total-each:
    max_bytes: 16384         # warn beyond 16KB; 22-33KB files trigger oversize
